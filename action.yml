name: 'CDK Impact Analyzer'
description: 'Find the AWS CDK stacks a pull request affects by tracing TypeScript symbol references.'
author: 'enomoto11'
branding:
  icon: 'git-branch'
  color: 'orange'

inputs:
  pr-number:
    description: 'GitHub PR number to analyze. If omitted, pass both base-ref and head-ref.'
    required: false
  base-ref:
    description: 'Base git ref (e.g. origin/main). Required when pr-number is omitted.'
    required: false
  head-ref:
    description: 'Head git ref (e.g. HEAD). Required when pr-number is omitted.'
    required: false
  project-path:
    description: 'Path to the CDK project root in the runner workspace.'
    required: false
    default: '.'
  tsconfig-path:
    description: 'Path to tsconfig.json relative to project-path.'
    required: false
    default: 'tsconfig.json'
  github-token:
    description: 'GitHub token for PR API access.'
    required: false
    default: ${{ github.token }}

outputs:
  affected-stacks:
    description: 'JSON array of affected CDK stack names.'
  affected-stack-count:
    description: 'Number of affected CDK stacks.'

runs:
  using: 'node24'
  main: 'dist/index.js'
